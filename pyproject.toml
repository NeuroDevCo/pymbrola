[project]
name = "mbrola"
version = "0.2.5"
description = 'A Python front-end for the MBROLA speech synthesizer'
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
keywords = []
authors = [
  { name = "Gonzalo Garcia-Castro", email = "gongarciacastro@gmail.com" },
]
classifiers = [
  "Development Status :: 4 - Beta",
  "Operating System :: POSIX :: Linux",
  "Programming Language :: Python",
  "Programming Language :: Python :: 3.8",
  "Programming Language :: Python :: 3.9",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: Implementation :: PyPy",
]

dependencies = ["pytest>=8.3.5"]

[project.urls]
Documentation = "https://github.com/gongcastro/pymbrola#readme"
Issues = "https://github.com/gongcastro/pymbrola/issues"
Source = "https://github.com/gongcastro/pymbrola"

[build-system]
requires = ["setuptools>=78.1.0", "wheel>=0.45.1"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
py-modules = ["mbrola"]

[tool.setuptools.packages.find]
where = ["src"]

[[tool.uv.index]]
name = "pypi"
url = "https://pypi.org/"
publish-url = "https://pypi.org/"
explicit = true
package = true



[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = "test_*.py"
addopts = "-v --maxfail=1 --cov=src"



[tool.coverage.run]
source_pkgs = ["mbrola"]
branch = true
parallel = true
relative_files = true
omit = ["src/__about__.py"]

[tool.coverage.paths]
pymbrola = ["mbrola"]
tests = ["tests"]

[tool.coverage.report]
exclude_lines = ["no cov", "if __name__ == .__main__.:", "if TYPE_CHECKING:"]

[dependency-groups]
dev = ["pytest>=8.3.5", "pytest-cov>=5.0.0", "ruff>=0.12.9"]
