on:
  push:
    branches:
      - main
  
jobs:
  docs:
    name: Deploy Sphinx docs
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        
      - name: Install dependencies
        run: |
          python -m pip install sphinx==8.0.0 pydata-sphinx-theme==0.17.1 sphinx-gallery==0.21.0 myst-parser==4.0.1

      - id: deployment
        uses: sphinx-notes/pages@v3